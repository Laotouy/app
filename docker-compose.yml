services:
  postgres_db:
    image: postgres:alpine
    volumes:
      - /Users/admin/Documents/GitHub/docker-data/app-postgres:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: labrinth
      POSTGRES_PASSWORD: labrinth
      POSTGRES_HOST_AUTH_METHOD: trust
      # 容器系统时区设为北京时间，影响日志输出。数据库 session timezone 由 labrinth
      # 在 PgPoolOptions::after_connect 时通过 SET TIME ZONE 'Asia/Shanghai' 显式设置。
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    healthcheck:
      test: ['CMD', 'pg_isready']
      interval: 3s
      timeout: 5s
      retries: 3
  meilisearch:
    image: getmeili/meilisearch:v1.12.0
    restart: on-failure
    ports:
      - '7700:7700'
    volumes:
      - /Users/admin/Documents/GitHub/docker-data/app-meilisearch:/data.ms
    environment:
      MEILI_MASTER_KEY: modrinth
      MEILI_HTTP_PAYLOAD_SIZE_LIMIT: 107374182400
      MEILI_LOG_LEVEL: warn
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:7700/health']
      interval: 3s
      timeout: 5s
      retries: 3
  redis:
    image: redis:alpine
    restart: on-failure
    ports:
      - '6379:6379'
    volumes:
      - /Users/admin/Documents/GitHub/docker-data/app-redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'PING']
      interval: 3s
      timeout: 5s
      retries: 3
  clickhouse:
    image: clickhouse/clickhouse-server
    ports:
      - '8123:8123'
    volumes:
      - /Users/admin/Documents/GitHub/docker-data/app-clickhouse:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: default
      # 容器系统时区设为北京时间。CH 服务端 timezone 与桶函数无关，
      # 桶函数必须由 labrinth 显式传 'Asia/Shanghai' 第三参数。
      TZ: Asia/Shanghai
    healthcheck:
      test: ['CMD', 'clickhouse-client', '--query', 'SELECT 1']
      interval: 3s
      timeout: 5s
      retries: 3